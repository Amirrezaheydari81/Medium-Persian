    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      width: 220px;
      background: #0f0f0f;
      color: #f0f0f0;
      font-family: 'Vazirmatn', Tahoma, sans-serif;
      font-size: 13px;
      direction: rtl;
    }

    .header {
      padding: 14px 14px 10px;
      display: flex;
      align-items: center;
      gap: 9px;
      border-bottom: 1px solid #1e1e1e;
    }
    .logo {
      width: 26px; height: 26px;
      background: #fff; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 15px; color: #000; flex-shrink: 0;
    }
    .title { font-size: 13px; font-weight: 600; color: #fff; }
    .sub   { font-size: 10px; color: #444; margin-top: 1px; }

    .section { padding: 10px 12px; border-bottom: 1px solid #1a1a1a; }

    .label { font-size: 10px; color: #444; margin-bottom: 6px; }

    .row { display: flex; align-items: center; justify-content: space-between; }

    /* toggle */
    .toggle-wrap { display: flex; align-items: center; gap: 8px; }
    .toggle {
      width: 32px; height: 18px; background: #2a2a2a;
      border-radius: 9px; position: relative; cursor: pointer;
      border: none; transition: background .2s; flex-shrink: 0;
    }
    .toggle.on { background: #fff; }
    .toggle::after {
      content: ''; position: absolute;
      width: 12px; height: 12px; background: #555;
      border-radius: 50%; top: 3px; right: 3px; transition: all .2s;
    }
    .toggle.on::after { background: #0f0f0f; right: calc(100% - 15px); }
    .toggle-label { font-size: 12px; color: #bbb; }

    /* site badges */
    .sites { display: flex; gap: 5px; flex-wrap: wrap; }
    .site-badge {
      font-size: 10px; padding: 3px 8px;
      background: #1a1a1a; border-radius: 20px; color: #555;
    }
    .site-badge.active { background: #222; color: #888; }

    /* action button */
    .btn-action {
      width: 100%; padding: 9px;
      background: #1a1a1a; border: 1px solid #252525;
      color: #777; border-radius: 8px; cursor: pointer;
      font-family: 'Vazirmatn', Tahoma, sans-serif;
      font-size: 11.5px; text-align: right;
      direction: rtl; transition: all .15s;
      display: flex; align-items: center; gap: 6px;
    }
    .btn-action:hover { background: #222; color: #aaa; border-color: #333; }
    .btn-action .icon { opacity: 0.6; }

    .not-medium {
      padding: 20px 14px; text-align: center;
      color: #333; font-size: 12px; line-height: 1.8;
    }
    .not-medium strong { color: #555; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">M</div>
    <div>
      <div class="title">Medium فارسی</div>
      <div class="sub">راست‌چین • فونت فارسی</div>
    </div>
  </div>
  <div id="content"></div>
  <script src="popup.js"></script>
</body>
</html>
